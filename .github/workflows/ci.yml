name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Formatting (fast gate) ─────────────────────────────────────────
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ─── Linting ────────────────────────────────────────────────────────
  clippy:
    name: cargo clippy
    needs: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features pyo3-bindings -- -D warnings

  # ─── Rust tests ─────────────────────────────────────────────────────
  test:
    name: cargo test (${{ matrix.os }})
    needs: clippy
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --features pyo3-bindings

  # ─── MSRV check ─────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.80)
    needs: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.80"
      - uses: Swatinem/rust-cache@v2
      # Check core library compiles on MSRV (pyo3-bindings may require newer Rust)
      - run: cargo check --all-targets

  # ─── Python smoke tests ────────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin and pytest
        run: pip install "maturin>=1.7,<2.0" pytest
      - name: Build and install
        run: maturin develop
      - name: Run Python tests
        run: pytest tests/python/ -v
